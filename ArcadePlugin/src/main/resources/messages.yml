# You can show title, subtitle, bossbar, and meessage.
# Each type is separated using a semicolon (;)

# Options available:
# - title:STRING (e.g. title:test)
# - subtitle:STRING (e.g. subtitle:hello)
# - titletime:FADE_IN:STAY:FADE_OUT (e.g. titletime:100:1000:200)
# - bossbar:STRING:TIME:COLOR:OVERLAY (e.g. bossbar:wither:5000:purple:progress)
#
# All times (FADE_IN, STAY, FADE_OUT, TIME) are in milliseconds.
# OVERLAY can be: (1) progress, (2) notched_6, (3) notched_10, (4) notched_12, (5) notched_20
# In message types with multiple parameters (titletime and bossbar), you can leave any one of them
# blank if you want it to be default.
# For example, not having fade_in time:
# titletime::1000:100
# You can escape a semicolon by adding a backslash right behind it. (e.g. \;)

countdown-message-singular: "title:<time>;subtitle:<gray>second remaining;titletime:0:900:100"
countdown-message-plural: "title:<time>;subtitle:<gray>seconds remaining;titletime:0:900:100"
match-started: "title:<green><b> Go!;titletime:300:1000:300"
match-ended: "title:<green><b>Match ended!"
participant-eliminated: "message:<red><b><participant></b></red> has been eliminated from the game!"